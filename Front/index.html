<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link3 Technologies Ltd.</title>
    <link rel="icon" type="image/png" href="./images/link3.jpg">
  <!-- Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background: radial-gradient(circle at 10% 20%, #d9e9ff, #c2ddf6 80%);
      height: 100vh;
      overflow: hidden;
      color: #0b2b4f;
    }

    /* main full-viewport container */
    .page {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      position: relative;
      isolation: isolate;
    }

    /* ---------- full background iot graphics (non messy, clean tech) ---------- */
    .iot-backdrop {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .grid-lines {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background-image: 
        linear-gradient(rgba(37, 99, 235, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.08) 1px, transparent 1px);
      background-size: 60px 60px;
      transform: rotate(5deg) scale(1.2);
      animation: slowDrift 60s linear infinite alternate;
    }

    @keyframes slowDrift {
      0% { transform: rotate(5deg) translate(0, 0) scale(1.2); }
      100% { transform: rotate(2deg) translate(-2%, -2%) scale(1.25); }
    }

    .digital-rain {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(transparent 0%, rgba(0,169,255,0.02) 50%, transparent 100%);
      background-size: 200% 200%;
      animation: rainShift 12s infinite linear;
      opacity: 0.4;
    }

    @keyframes rainShift {
      0% { background-position: 0% 0%; }
      100% { background-position: 0% 100%; }
    }

    .orbit-ring {
      position: absolute;
      width: 70vmax;
      height: 70vmax;
      border-radius: 50%;
      border: 2px dashed rgba(59, 130, 246, 0.2);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(0deg);
      animation: rotateRing 50s linear infinite;
      box-shadow: 0 0 40px rgba(37,99,235,0.1);
    }

    .orbit-ring::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: rgba(37,99,235,0.25);
      border-radius: 50%;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      filter: blur(4px);
    }

    @keyframes rotateRing {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* floating particles (keep subtle) */
    .bg-particles {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    .bg-particles span {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(0, 110, 255, 0.2);
      border-radius: 50%;
      box-shadow: 0 0 20px #3b82f6;
      animation: floatParticle 18s infinite linear;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) translateX(0) scale(0.8); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-20vh) translateX(40px) scale(1.2); opacity: 0; }
    }

    /* navbar / top bar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 3rem;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: 0 8px 20px -6px rgba(0, 45, 90, 0.15);
      position: relative;
      z-index: 10;
      flex-wrap: wrap;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      flex-wrap: wrap;
    }

    .brand-img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    /* simulating png image + name — now inline */
    .company-name {
      font-weight: 800;
      font-size: 1.5rem;
      color: #034DA2;
      letter-spacing: 0.2px;
      line-height: 1.2;
    }

    .product-badge {
      background: #1e4a7a;
      color: white;
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-left: 0.5rem;
      box-shadow: 0 4px 12px rgba(0, 110, 255, 0.3);
      white-space: nowrap;
    }

    .login-btn {
      background: white;
      border: none;
      padding: 0.7rem 2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      color: #0b2b4f;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: 0 10px 18px -8px #1e4a7a66;
      cursor: pointer;
      transition: 0.2s ease;
      border: 1px solid rgba(59, 130, 246, 0.3);
      backdrop-filter: blur(4px);
    }

    .login-btn i { color: #2563eb; font-size: 1.1rem; }
    .login-btn:hover {
      background: #f5faff;
      box-shadow: 0 16px 22px -8px #1e4a7a99;
      transform: scale(1.02);
      border-color: #3b82f6;
    }

    /* main hero — headline 30% / flow-visual 70% (clean flex) */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem 0 4rem;
      position: relative;
      z-index: 5;
      /* gap: 2rem; */
    }

    /* left headline — width 30% */
    .headline {
      width: 40%;
      min-width: 380px;
    }

    .iot-tag {
      background: rgba(37, 99, 235, 0.2);
      display: inline-block;
      padding: 0.3rem 1.1rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #1e4a7a;
      border: 1px solid rgba(59, 130, 246, 0.4);
      backdrop-filter: blur(2px);
      margin-bottom: 1.5rem;
    }

    .headline h1 {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1.1;
      color: #0a2a44;
    }

    .headline h1 span {
      color: #2563eb;
      position: relative;
      display: inline-block;
    }

    .headline h1 span::after {
      content: "";
      position: absolute;
      bottom: 6px;
      left: 0;
      width: 100%;
      height: 8px;
      background: rgba(59, 130, 246, 0.2);
      z-index: -1;
      border-radius: 4px;
    }

    .sub-message {
      margin-top: 1.2rem;
      font-size: 1rem;
      color: #2c3f5c;
      line-height: 1.5;
      border-left: 4px solid #3b82f6;
      padding-left: 1.2rem;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 0 12px 12px 0;
      backdrop-filter: blur(2px);
    }

    /* flow visual — width 70% */
    .flow-visual {
      width: 60%;
      max-width: 750px;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 58px;
      padding: 2rem 1.8rem;
      box-shadow: 0 30px 40px -20px rgba(0, 51, 102, 0.4), inset 0 1px 3px rgba(255,255,255,0.8);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .flow-title {
      display: flex;
      justify-content: center;
      gap: 2.2rem;
      margin-bottom: 1.2rem;
      font-weight: 600;
      color: #163a5e;
    }

    .flow-title span {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.9rem;
    }

    .flow-title span i {
      font-size: 1.8rem;
      margin-bottom: 6px;
      color: #2563eb;
      background: rgba(255,255,255,0.5);
      padding: 10px;
      border-radius: 50%;
      box-shadow: 0 6px 12px rgba(0,0,0,0.05);
    }

    .flow-animation {
      display: flex;
      align-items: center;
      justify-content: space-around;
      margin: 1.5rem 0 0.8rem;
      position: relative;
      min-height: 110px;
    }

    .node {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
    }

    .node .icon-circle {
      width: 70px;
      height: 70px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: #1e4a7a;
      box-shadow: 0 12px 20px -8px #0b2b4f;
      border: 2px solid #3b82f6;
      animation: softGlow 3s infinite alternate;
    }

    @keyframes softGlow {
      0% { box-shadow: 0 4px 12px rgba(37,99,235,0.3); border-color: #3b82f6; }
      100% { box-shadow: 0 4px 26px rgba(37,99,235,0.8); border-color: #60a5fa; }
    }

    .node .label {
      margin-top: 10px;
      font-weight: 600;
      font-size: 0.85rem;
      background: rgba(37,99,235,0.2);
      padding: 4px 14px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.4);
    }

    .connecting-line {
      flex: 1;
      height: 3px;
      background: linear-gradient(90deg, #2563eb, #60a5fa, #2563eb);
      margin: 0 8px;
      border-radius: 6px;
      box-shadow: 0 0 16px #3b82f6;
      animation: dataPulse 2s infinite ease-in-out;
    }

    @keyframes dataPulse {
      0% { opacity: 0.5; transform: scaleX(0.95); }
      50% { opacity: 1; transform: scaleX(1.05); background: #60a5fa; }
      100% { opacity: 0.5; transform: scaleX(0.95); }
    }

    .packet {
      position: absolute;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      top: -5px;
      box-shadow: 0 0 20px #3b82f6;
      border: 2px solid #2563eb;
      animation: shootPacket 2.6s infinite cubic-bezier(0.4,0,0.2,1);
      z-index: 5;
    }

    .packet-left { left: 12%; animation-delay: 0s; }
    .packet-right { left: 50%; animation-delay: 1.4s; }

    @keyframes shootPacket {
      0% { transform: translateX(0) scale(0.8); opacity: 0.2; }
      20% { transform: translateX(30px) scale(1.2); opacity: 1; }
      80% { transform: translateX(180px) scale(1); opacity: 0.8; }
      100% { transform: translateX(250px) scale(0.6); opacity: 0; }
    }

    .visual-graph {
      margin-top: 2rem;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 1.2rem;
      height: 100px;
    }

    .bar {
      width: 26px;
      background: linear-gradient(to top, #2563eb, #60a5fa);
      border-radius: 20px 20px 8px 8px;
      box-shadow: 0 -6px 16px #3b82f6;
      animation: barViz 2.2s infinite alternate ease-in-out;
      transform-origin: bottom;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      color: white;
      font-size: 0.65rem;
      font-weight: 600;
      padding-bottom: 4px;
    }

    .bar1 { height: 44px; animation-delay: 0s; }
    .bar2 { height: 76px; animation-delay: 0.3s; width: 30px; }
    .bar3 { height: 28px; animation-delay: 0.6s; }
    .bar4 { height: 60px; animation-delay: 0.9s; width: 30px; }
    .bar5 { height: 38px; animation-delay: 0.2s; }

    @keyframes barViz {
      0% { transform: scaleY(0.8); opacity: 0.8; }
      100% { transform: scaleY(1.2); opacity: 1; background: #3b82f6; }
    }

    .graph-label {
      text-align: center;
      margin-top: 18px;
      font-weight: 500;
      color: #163a5e;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.5);
      padding: 6px 18px;
      border-radius: 30px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      border: 1px solid rgba(59,130,246,0.3);
      backdrop-filter: blur(4px);
    }

    .footer-note {
      position: absolute;
      bottom: 1.5rem;
      right: 3rem;
      font-size: 0.85rem;
      color: #1e3f68;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
      border: 1px solid rgba(59,130,246,0.25);
      z-index: 7;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .footer-note i { color: #2563eb; animation: pingSlow 2s infinite; }
    @keyframes pingSlow {
      0% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0.7; transform: scale(1); }
    }

    /* responsive */
    @media (max-width: 1000px) {
      .hero { flex-direction: column; padding: 1.5rem; justify-content: center; }
      .headline, .flow-visual { width: 95%; max-width: 600px; }
      .headline { text-align: center; }
      .sub-message { border-left: none; border-top: 4px solid #3b82f6; }
      .navbar { padding: 0.75rem 1.5rem; }
      .company-name { font-size: 1.2rem; }
      .brand-img { width: 36px; height: 36px; }
      .product-badge { font-size: 0.8rem; padding: 0.2rem 0.7rem; }
    }

    @media (max-width: 550px) {
      .navbar { flex-direction: column; gap: 0.8rem; align-items: flex-start; }
      .login-btn { align-self: flex-end; }
      .brand-img { width: 32px; height: 32px; }
    }
  </style>
</head>
