<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="registration.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>Link3 Technologies Ltd.</title>
    <link rel="icon" type="image/png" href="./hams/app/images/link3.jpg">
</head>

<body>
    <div class="wrapper">
        <div class="title-text">
            <div class="title login">Login Form</div>
            <div class="title signup">Signup Form</div>
        </div>
        <div class="form-container">
            <div class="form-inner">
                <form action="#" id="login-form" class="login">
                    <div class="field">
                        <input type="text" id="username" placeholder="Email" required />
                    </div>
                    <div class="field password-field">
                        <input type="password" id="password" placeholder="Password" required />
                        <i class="fa-regular fa-eye-slash" id="togglePassword"></i>
                    </div>
                    <div class="field btn">
                        <div class="btn-layer"></div>
                        <input type="submit" value="Login" />
                    </div>
                    <br />
                    <p id="error" style="color:red;"></p>
                    <br />
                    <div class="brand">
                        <img class="brand-img" src="././hams1/app/images/link3.jpg" alt="" />
                        <div class="brand2">
                            <a href="#"><span class="logo">Infini</span>BOX</a>
                            <h5>
                                <span class="logo-text">Innovated by <br /></span>Link3
                                Technologies LTD
                            </h5>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="registration.js"></script>
</body>

</html>
